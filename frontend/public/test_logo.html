<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Test</title>
  <style>
    body { background-color: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .logo-container { padding: 40px; background: #1e1e1e; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
      <defs>
        <!-- Soft glow -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#3B82F6" flood-opacity="0.4"/>
        </filter>
      </defs>

      <!-- 3D Extrusion (Back Shadow/Side) -->
      <!-- Translate by dx=3, dy=5 -->
      <path d="M 19,21 L 87,21 L 87,39 L 45,71 L 87,71 L 87,89 L 19,89 L 19,71 L 61,39 L 19,39 Z" fill="#09090b" />
      
      <!-- Connectors for 3D faces -->
      <!-- Top edge -->
      <polygon points="16,16 84,16 87,21 19,21" fill="#1f1f22" />
      <!-- Right edge top bar -->
      <polygon points="84,16 87,21 87,39 84,34" fill="#000000" />
      <!-- Inner right edge -->
      <polygon points="84,34 87,39 45,71 42,66" fill="#1f1f22" />
      <!-- Top edge bottom bar (wait, this might be hidden or exposed? exposed.) -->
      <polygon points="42,66 45,71 87,71 84,66" fill="#1f1f22" />
      <!-- Right edge bottom bar -->
      <polygon points="84,66 87,71 87,89 84,84" fill="#000000" />
      <!-- Bottom edge bottom bar -->
      <polygon points="16,84 84,84 87,89 19,89" fill="#09090b" />
      <!-- Left edge bottom bar -->
      <polygon points="16,66 19,71 19,89 16,84" fill="#1f1f22" />

      <!-- Main Front Face -->
      <path d="M 16,16 L 84,16 L 84,34 L 42,66 L 84,66 L 84,84 L 16,84 L 16,66 L 58,34 L 16,34 Z" fill="#27272a" stroke="#3B82F6" stroke-width="0.5" filter="url(#glowBlue)" />
    </svg>
  </div>
</body>
</html>

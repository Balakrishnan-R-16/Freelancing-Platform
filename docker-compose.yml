services:
  # ── MySQL Database ──────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: freelance-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: freelance_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────
  backend:
    build: ./backend
    container_name: freelance-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/freelance_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_AI_SERVICE_URL: http://ai-service:8000
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_SZ1bf4kK6cibdx}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-JZMVgw7xBU9p4hsuO5OCUMd8}
    depends_on:
      mysql:
        condition: service_healthy

  # ── Python AI Microservice ──────────────────────
  ai-service:
    build: ./ai-service
    container_name: freelance-ai
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: "AIzaSyB8pqoxEeGp2a-4GRF7jiTToEfSgMtN_WI"

  # ── React Frontend ─────────────────────────────
  frontend:
    build: ./frontend
    container_name: freelance-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
